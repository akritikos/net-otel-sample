name: otel-sample

services:
  otel-sample:
    container_name: otel-sample
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PUBLISHED_PROJECT: OTEL.WebSample
        RUNTIME_BASE: web
        PYROSCOPE_VERSION: 0.14.3
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc

  generator:
    container_name: otel-generator
    build:
      context: .
      dockerfile: docker/Dockerfile.poll
    restart: no
    environment:
      API_URL: http://otel-sample:8080
