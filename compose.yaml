name: otel-sample

services:
  otel-sample:
    container_name: otel-sample
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PUBLISHED_PROJECT: OTEL.WebSample
        RUNTIME_BASE: web
        PYROSCOPE_VERSION: 0.14.3
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      CORECLR_ENABLE_PROFILING: "1"
      CORECLR_PROFILER: "{BD1A650D-AC5D-4896-B64F-D6FA25D6B26A}"
      CORECLR_PROFILER_PATH: /usr/lib/Pyroscope.Profiler.Native.so
      LD_PRELOAD: /usr/lib/Pyroscope.Linux.ApiWrapper.x64.so
      LD_LIBRARY_PATH: /usr/lib
      PYROSCOPE_SERVER_ADDRESS: http://host.docker.internal:9999
      PYROSCOPE_PROFILING_ENABLED: "1"
      PYROSCOPE_PROFILING_CPU_ENABLED: "1"
      PYROSCOPE_PROFILING_EXCEPTION_ENABLED: "1"
      PYROSCOPE_PROFILING_ALLOCATION_ENABLED: "1"
      PYROSCOPE_PROFILING_LOCK_ENABLED: "1"
      PYROSCOPE_LOG_LEVEL: warn
      PYROSCOPE_APPLICATION_NAME: weather-api

  generator:
    container_name: otel-generator
    build:
      context: .
      dockerfile: docker/Dockerfile.poll
    restart: no
    environment:
      API_URL: http://otel-sample:8080
